name: Framework CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Framework consistency checks
        env:
          SCRUB_PATTERNS: ${{ secrets.SCRUB_PATTERNS }}
        run: bash scripts/ci-checks.sh

      - name: Hook smoke tests
        run: bash tests/hooks-smoke.sh
